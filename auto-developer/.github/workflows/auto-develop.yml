name: Auto Develop Repositories

on:
  schedule:
    # 毎日 午前9時 (UTC) に実行 → 日本時間 午後6時
    - cron: '0 9 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-developer
        env:
          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_USERNAME: toukanno
        run: python develop_repos.py
