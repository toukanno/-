<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせフォーム</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <h1>お問い合わせフォーム</h1>

  <form action="mail_confirm.php" method="post">
    <div>
      <label for="name">名前</label><br>
      <input type="text" id="name" name="name" class="text" placeholder="山田 太郎" required>
    </div>

    <div>
      <label for="mail">メールアドレス</label><br>
      <input type="email" id="mail" name="mail" class="text" placeholder="example@email.com" required>
    </div>

    <div>
      <label for="age">年齢</label><br>
      <select id="age" name="age" class="dropdown">
        <option value="">選択してください</option>
        <option value="10代">10代</option>
        <option value="20代">20代</option>
        <option value="30代">30代</option>
        <option value="40代">40代</option>
        <option value="50代">50代</option>
        <option value="60代以上">60代以上</option>
      </select>
    </div>

    <div>
      <label for="comments">コメント</label><br>
      <textarea id="comments" name="comments" rows="5" cols="40" placeholder="お問い合わせ内容をご記入ください"></textarea>
    </div>

    <div>
      <input type="submit" class="submit" value="確認する">
    </div>
  </form>
</body>

</html>
