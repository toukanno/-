<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger Desktop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>会計帳簿デスクトップアプリ（スターター）</h1>
      <section class="card">
        <h2>仕訳登録</h2>
        <form id="entry-form" class="entry-form">
          <label>日付<input id="date" type="date" required /></label>
          <label>勘定科目<input id="account" type="text" placeholder="旅費交通費" required /></label>
          <label>摘要<input id="description" type="text" placeholder="打ち合わせ交通費" required /></label>
          <label>金額<input id="amount" type="number" placeholder="1200" required /></label>
          <button type="submit">登録</button>
        </form>
      </section>

      <section class="card">
        <div class="header-row">
          <h2>帳簿一覧</h2>
          <p>合計: <strong id="total-amount">0</strong> 円</p>
        </div>
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>勘定科目</th>
              <th>摘要</th>
              <th>金額</th>
            </tr>
          </thead>
          <tbody id="entry-table-body"></tbody>
        </table>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
