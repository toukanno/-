<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="築地から毎朝届く新鮮な素材を匠の技で">
  <title>鮨処 匠</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">鮨処 匠</div>
      <nav>
        <ul>
          <li><a href="#home">ホーム</a></li>
          <li><a href="#features">特徴</a></li>
          <li><a href="#about">私たちについて</a></li>
          <li><a href="#contact">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero" id="home">
    <h1>鮨処 匠</h1>
    <p>江戸前の技と心</p>
    <a href="#contact" class="cta-btn">お問い合わせ</a>
  </section>

  <section id="features">
    <h2>サービス・特徴</h2>
    <div class="features">
      <div class="feature-card">
        <div class="icon">🍣</div>
        <h3>おまかせコース</h3>
        <p>旬のネタを職人が握るおまかせ</p>
      </div>
      <div class="feature-card">
        <div class="icon">🐟</div>
        <h3>一品料理</h3>
        <p>季節の逸品と創作料理</p>
      </div>
      <div class="feature-card">
        <div class="icon">🍶</div>
        <h3>厳選日本酒</h3>
        <p>全国の蔵元から厳選した日本酒</p>
      </div>
    </div>
  </section>

  <section id="about">
    <h2>私たちについて</h2>
    <div class="about-content">
      <div class="about-text">
        <p>築地から毎朝届く新鮮な素材を匠の技で</p>
        <p>お客様に最高のサービスをお届けするために、スタッフ一同心を込めて取り組んでおります。お気軽にお問い合わせください。</p>
      </div>
      <div class="about-image">🍣</div>
    </div>
  </section>

  <section id="contact">
    <h2>お問い合わせ</h2>
    <form class="contact-form">
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required placeholder="山田太郎">
      </div>
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label for="message">メッセージ</label>
        <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>
      <button type="submit" class="submit-btn">送信する</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 鮨処 匠 All Rights Reserved.</p>
  </footer>
</body>
</html>
