<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単位変換</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>単位変換</h1>
    </header>

    <nav class="tabs" role="tablist"></nav>

    <main class="converter">
      <div class="input-group">
        <label for="input-value">変換する値</label>
        <input type="number" id="input-value" placeholder="0" step="any" autofocus>
      </div>

      <div class="unit-row">
        <div class="unit-select-group">
          <label for="from-unit">変換元</label>
          <select id="from-unit"></select>
        </div>

        <button class="swap-btn" id="swap-btn" title="入れ替え" aria-label="単位を入れ替え">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 16l-4-4 4-4"/>
            <path d="M17 8l4 4-4 4"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
          </svg>
        </button>

        <div class="unit-select-group">
          <label for="to-unit">変換先</label>
          <select id="to-unit"></select>
        </div>
      </div>

      <div class="result-group">
        <label>結果</label>
        <div class="result-display">
          <span id="result-value">0</span>
          <span id="result-unit"></span>
          <button class="copy-btn" id="copy-btn" title="コピー" aria-label="結果をコピー">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
        <p class="formula" id="formula"></p>
      </div>
    </main>

    <section class="history-section">
      <div class="history-header">
        <h2>変換履歴</h2>
        <button class="clear-history-btn" id="clear-history-btn">クリア</button>
      </div>
      <ul class="history-list" id="history-list">
        <li class="history-empty">履歴はありません</li>
      </ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
