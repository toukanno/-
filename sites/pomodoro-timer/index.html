<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>&#x1f345; ポモドーロタイマー</h1>
    </header>

    <!-- Task Input -->
    <div class="task-input-wrapper">
      <input type="text" id="task-input" placeholder="今のタスクを入力..." maxlength="60">
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="pomodoro">作業</button>
      <button class="mode-tab" data-mode="shortBreak">短い休憩</button>
      <button class="mode-tab" data-mode="longBreak">長い休憩</button>
    </div>

    <!-- Timer Display -->
    <div class="timer-container">
      <svg class="timer-svg" viewBox="0 0 240 240">
        <circle class="timer-bg" cx="120" cy="120" r="105" />
        <circle class="timer-progress" cx="120" cy="120" r="105"
                stroke-dasharray="659.73" stroke-dashoffset="0" />
      </svg>
      <div class="timer-text">
        <span id="timer-display">25:00</span>
        <span id="timer-label">作業</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="btn-start" class="btn btn-primary">開始</button>
      <button id="btn-pause" class="btn btn-secondary" disabled>一時停止</button>
      <button id="btn-reset" class="btn btn-outline">リセット</button>
    </div>

    <!-- Session Indicators -->
    <div class="session-indicators">
      <span class="session-dot" data-index="0"></span>
      <span class="session-dot" data-index="1"></span>
      <span class="session-dot" data-index="2"></span>
      <span class="session-dot" data-index="3"></span>
    </div>
    <p class="session-label">セッション: <span id="session-count">0</span> / 4</p>

    <!-- Daily Stats -->
    <div class="stats-card">
      <h3>今日の記録</h3>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-value" id="stat-pomodoros">0</span>
          <span class="stat-label">完了ポモドーロ</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-minutes">0</span>
          <span class="stat-label">集中時間 (分)</span>
        </div>
      </div>
    </div>

    <!-- Settings Toggle -->
    <button id="btn-settings" class="btn-icon" aria-label="設定">&#9881; 設定</button>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <h3>設定</h3>
      <div class="setting-row">
        <label for="setting-pomodoro">作業時間 (分)</label>
        <input type="number" id="setting-pomodoro" min="1" max="120" value="25">
      </div>
      <div class="setting-row">
        <label for="setting-short">短い休憩 (分)</label>
        <input type="number" id="setting-short" min="1" max="30" value="5">
      </div>
      <div class="setting-row">
        <label for="setting-long">長い休憩 (分)</label>
        <input type="number" id="setting-long" min="1" max="60" value="15">
      </div>
      <div class="setting-row">
        <label for="setting-volume">通知音量</label>
        <input type="range" id="setting-volume" min="0" max="100" value="70">
      </div>
      <button id="btn-save-settings" class="btn btn-primary btn-small">保存</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
