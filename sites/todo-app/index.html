<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-top">
        <h1>Todo</h1>
        <button id="dark-mode-toggle" class="icon-btn" aria-label="ダークモード切替">
          <span class="icon-sun">&#9728;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="タスクを検索...">
      </div>
    </header>

    <section class="add-todo-section">
      <form id="todo-form">
        <div class="form-row">
          <input type="text" id="todo-input" placeholder="新しいタスクを入力..." required>
          <button type="submit" class="btn-add">追加</button>
        </div>
        <div class="form-row form-options">
          <div class="form-group">
            <label for="priority-select">優先度</label>
            <select id="priority-select">
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="低">低</option>
            </select>
          </div>
          <div class="form-group">
            <label for="due-date-input">期日</label>
            <input type="date" id="due-date-input">
          </div>
          <div class="form-group">
            <label for="category-input">カテゴリ</label>
            <input type="text" id="category-input" placeholder="例: 仕事, 個人">
          </div>
        </div>
      </form>
    </section>

    <section class="filters-section">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="completed">完了済み</button>
      </div>
    </section>

    <section class="todo-list-section">
      <ul id="todo-list"></ul>
      <div class="empty-state" id="empty-state">
        <p>タスクがありません</p>
      </div>
    </section>

    <footer class="app-footer">
      <span id="todo-count">0 件のタスク</span>
      <button id="clear-completed" class="btn-clear">完了済みを削除</button>
    </footer>
  </div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>タスクを編集</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="edit-text">タスク名</label>
          <input type="text" id="edit-text" required>
        </div>
        <div class="form-group">
          <label for="edit-priority">優先度</label>
          <select id="edit-priority">
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-due">期日</label>
          <input type="date" id="edit-due">
        </div>
        <div class="form-group">
          <label for="edit-category">カテゴリ</label>
          <input type="text" id="edit-category">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="edit-cancel">キャンセル</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
