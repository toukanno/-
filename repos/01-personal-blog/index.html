<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Blog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #333; }
    header { background: #2c3e50; color: white; padding: 20px 40px; }
    header h1 { font-size: 1.8rem; }
    nav a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
    nav a:hover { color: white; }
    main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .post { background: white; border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .post h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .post .meta { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
    .post p { line-height: 1.7; color: #555; }
    .tag { background: #eef2ff; color: #4f46e5; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; margin-right: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="#">ホーム</a>
      <a href="#">アーカイブ</a>
      <a href="#">について</a>
    </nav>
  </header>
  <main>
    <article class="post">
      <h2>はじめての投稿</h2>
      <div class="meta">2026年3月9日 <span class="tag">日記</span></div>
      <p>ブログを始めました。これからいろいろ書いていきます。</p>
    </article>
    <article class="post">
      <h2>JavaScriptのtipsまとめ</h2>
      <div class="meta">2026年3月8日 <span class="tag">Tech</span> <span class="tag">JavaScript</span></div>
      <p>最近学んだJavaScriptの便利な書き方をまとめました。</p>
    </article>
  </main>
</body>
</html>
