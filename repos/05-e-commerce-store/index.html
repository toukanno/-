<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    header { background: white; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 1.5rem; color: #e11d48; }
    .cart-btn { background: #e11d48; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
    .products { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
    .product { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
    .product:hover { transform: translateY(-4px); }
    .product-img { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .product-info { padding: 16px; }
    .product-info h3 { margin-bottom: 8px; }
    .product-info .price { color: #e11d48; font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; }
    .add-btn { width: 100%; padding: 10px; background: #e11d48; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    .add-btn:hover { background: #be123c; }
  </style>
</head>
<body>
  <header>
    <h1>SHOP</h1>
    <button class="cart-btn" onclick="alert('カート: ' + cart.length + ' 点')">🛒 カート (<span id="cartCount">0</span>)</button>
  </header>
  <div class="products" id="products"></div>
  <script>
    const items = [
      { id: 1, name: 'ワイヤレスイヤホン', price: 8980, emoji: '🎧' },
      { id: 2, name: 'スマートウォッチ', price: 24800, emoji: '⌚' },
      { id: 3, name: 'メカニカルキーボード', price: 12800, emoji: '⌨️' },
      { id: 4, name: 'Webカメラ HD', price: 6500, emoji: '📷' },
      { id: 5, name: 'USBハブ 7ポート', price: 3980, emoji: '🔌' },
      { id: 6, name: 'ノートPC スタンド', price: 4500, emoji: '💻' },
    ];
    let cart = [];
    function render() {
      document.getElementById('products').innerHTML = items.map(item => `
        <div class="product">
          <div class="product-img">${item.emoji}</div>
          <div class="product-info">
            <h3>${item.name}</h3>
            <div class="price">¥${item.price.toLocaleString()}</div>
            <button class="add-btn" onclick="addCart(${item.id})">カートに追加</button>
          </div>
        </div>`).join('');
    }
    function addCart(id) {
      cart.push(id);
      document.getElementById('cartCount').textContent = cart.length;
    }
    render();
  </script>
</body>
</html>
