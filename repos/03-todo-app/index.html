<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .app { background: white; border-radius: 16px; padding: 32px; width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #1a1a2e; }
    .input-row { display: flex; gap: 10px; margin-bottom: 24px; }
    input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0ff; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button.add { background: #6366f1; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: white; color: #666; }
    .filters button.active { background: #6366f1; color: white; border-color: #6366f1; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; margin-bottom: 8px; background: #f8f8ff; }
    .todo-item.done span { text-decoration: line-through; color: #aaa; }
    .todo-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #6366f1; }
    .todo-item span { flex: 1; }
    .todo-item .del { background: none; border: none; cursor: pointer; color: #f87171; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo App</h1>
    <div class="input-row">
      <input id="taskInput" type="text" placeholder="タスクを入力..." />
      <button class="add" onclick="addTask()">追加</button>
    </div>
    <div class="filters">
      <button class="active" onclick="filter('all', this)">全て</button>
      <button onclick="filter('active', this)">未完了</button>
      <button onclick="filter('done', this)">完了済み</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>
  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let currentFilter = 'all';
    function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
    function addTask() {
      const v = document.getElementById('taskInput').value.trim();
      if (!v) return;
      tasks.push({ id: Date.now(), text: v, done: false });
      document.getElementById('taskInput').value = '';
      save(); render();
    }
    function toggle(id) { tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t); save(); render(); }
    function del(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); }
    function filter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render();
    }
    function render() {
      const list = document.getElementById('todoList');
      let visible = tasks;
      if (currentFilter === 'active') visible = tasks.filter(t => !t.done);
      if (currentFilter === 'done') visible = tasks.filter(t => t.done);
      list.innerHTML = visible.map(t => `<li class="todo-item ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
        <span>${t.text}</span>
        <button class="del" onclick="del(${t.id})">✕</button>
      </li>`).join('');
    }
    render();
    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  </script>
</body>
</html>
