<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; color: white; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 2rem; text-align: center; margin-bottom: 32px; opacity: 0.9; }
    .search { display: flex; gap: 12px; margin-bottom: 40px; }
    .search input { flex: 1; padding: 14px 20px; border-radius: 30px; border: none; font-size: 1rem; background: rgba(255,255,255,0.2); color: white; outline: none; }
    .search input::placeholder { color: rgba(255,255,255,0.7); }
    .search button { padding: 14px 28px; border-radius: 30px; border: none; background: white; color: #2a5298; font-weight: bold; cursor: pointer; }
    .current { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 36px; text-align: center; margin-bottom: 32px; backdrop-filter: blur(10px); }
    .current .city { font-size: 1.5rem; margin-bottom: 8px; }
    .current .temp { font-size: 5rem; font-weight: bold; }
    .current .desc { font-size: 1.2rem; opacity: 0.8; margin-top: 8px; }
    .forecast { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .day { background: rgba(255,255,255,0.12); border-radius: 12px; padding: 20px; text-align: center; }
    .day .date { font-size: 0.85rem; opacity: 0.7; margin-bottom: 8px; }
    .day .icon { font-size: 2rem; margin: 8px 0; }
    .day .temp { font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Weather Dashboard</h1>
    <div class="search">
      <input type="text" placeholder="都市名を入力..." id="cityInput" value="Tokyo" />
      <button onclick="fetchWeather()">検索</button>
    </div>
    <div class="current">
      <div class="city" id="cityName">東京, JP</div>
      <div class="temp" id="tempVal">22°C</div>
      <div class="desc" id="descVal">晴れ時々曇り</div>
    </div>
    <div class="forecast" id="forecast">
      <div class="day"><div class="date">月</div><div class="icon">☀️</div><div class="temp">24°C</div></div>
      <div class="day"><div class="date">火</div><div class="icon">🌤️</div><div class="temp">21°C</div></div>
      <div class="day"><div class="date">水</div><div class="icon">🌧️</div><div class="temp">18°C</div></div>
      <div class="day"><div class="date">木</div><div class="icon">🌦️</div><div class="temp">20°C</div></div>
      <div class="day"><div class="date">金</div><div class="icon">☁️</div><div class="temp">22°C</div></div>
    </div>
  </div>
  <script>
    async function fetchWeather() {
      // APIキーを取得してリアルデータを使用可能
      const API_KEY = 'YOUR_API_KEY';
      const city = document.getElementById('cityInput').value;
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=ja`);
        const data = await res.json();
        document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
        document.getElementById('tempVal').textContent = `${Math.round(data.main.temp)}°C`;
        document.getElementById('descVal').textContent = data.weather[0].description;
      } catch (e) {
        console.log('デモモードで表示中');
      }
    }
  </script>
</body>
</html>
